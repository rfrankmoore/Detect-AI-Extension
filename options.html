<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detect AI — Options</title>
  <style>
    body {
      max-width: 480px;
      margin: 40px auto;
      padding: 0 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #222;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .field-hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
    }
    button:hover {
      background: #1558b0;
    }
    #status {
      font-size: 13px;
      color: #388e3c;
    }
    #status.error {
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <h1>Detect AI — Options</h1>

  <div class="field">
    <label for="api-key">Claude API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-…" autocomplete="off" />
    <p class="field-hint">
      Your key is stored locally in your browser and never transmitted anywhere
      other than <code>api.anthropic.com</code>.
    </p>
  </div>

  <div class="actions">
    <button id="save-btn">Save</button>
    <span id="status"></span>
  </div>

  <script src="dist/options.js" type="module"></script>
</body>
</html>
