<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detect AI</title>
  <style>
    body {
      width: 260px;
      padding: 16px;
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 14px;
    }
    button#toggle-btn {
      width: 100%;
      padding: 9px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
    }
    button#toggle-btn:hover {
      background: #1558b0;
    }
    button#toggle-btn.active {
      background: #d32f2f;
    }
    button#toggle-btn.active:hover {
      background: #b71c1c;
    }
    #options-link {
      display: block;
      margin-top: 12px;
      font-size: 12px;
      color: #555;
      text-align: center;
      text-decoration: none;
    }
    #options-link:hover {
      text-decoration: underline;
    }
    #no-key-warning {
      display: none;
      margin-top: 10px;
      padding: 8px;
      background: #fff3e0;
      border: 1px solid #fb8c00;
      border-radius: 4px;
      font-size: 12px;
      color: #e65100;
    }
  </style>
</head>
<body>
  <h1>Detect AI</h1>

  <button id="toggle-btn">Highlight Paragraphs</button>

  <div id="no-key-warning">
    No API key set. <a href="#" id="open-options">Open Options</a> to add one.
  </div>

  <a href="#" id="options-link">Options</a>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
